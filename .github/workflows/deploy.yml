name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy to mardelplata/mardelplata.github.io
        env:
          DEPLOY_KEY: ${{ secrets.MARDELPLATA_DEPLOY_KEY }}
        run: |
          # Configure SSH
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes"

          # Clone target repo (shallow)
          git clone --depth=1 --branch=master \
            git@github.com:mardelplata/mardelplata.github.io.git \
            /tmp/target

          # Replace only the HTML files — preserve .git
          cp index.html      /tmp/target/index.html
          cp reglamento.html /tmp/target/reglamento.html
          cp public/CNAME    /tmp/target/CNAME

          # Commit and push
          cd /tmp/target
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html reglamento.html CNAME
          git diff --cached --quiet && echo "Nothing changed, skipping push." && exit 0
          git commit -m "deploy: ${{ github.sha }}"
          git push origin master
