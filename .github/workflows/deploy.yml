name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        # Produces ./out/ thanks to output: 'export' in next.config.ts

      - name: Deploy to mardelplata/mardelplata.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          # PAT with write access to the mardelplata account.
          # Create it at https://github.com/settings/tokens and add it
          # as secret MARDELPLATA_DEPLOY_TOKEN in this repo's settings.
          personal_token: ${{ secrets.MARDELPLATA_DEPLOY_TOKEN }}
          external_repository: mardelplata/mardelplata.github.io
          publish_branch: master
          publish_dir: ./out
          # The CNAME file is already inside ./out (copied from public/CNAME)
          # so the custom domain mardelplata.dev.ar is preserved automatically.
