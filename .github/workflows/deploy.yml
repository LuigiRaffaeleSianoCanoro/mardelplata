name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        # Produces ./out/ thanks to output: 'export' in next.config.ts

      - name: Deploy to mardelplata/mardelplata.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          # SSH deploy key: private key stored as secret MARDELPLATA_DEPLOY_KEY,
          # public key added as a Deploy Key (with write access) on
          # mardelplata/mardelplata.github.io via Settings → Deploy keys.
          deploy_key: ${{ secrets.MARDELPLATA_DEPLOY_KEY }}
          external_repository: mardelplata/mardelplata.github.io
          publish_branch: master
          publish_dir: ./out
          # The CNAME file is already inside ./out (copied from public/CNAME)
          # so the custom domain mardelplata.dev.ar is preserved automatically.
